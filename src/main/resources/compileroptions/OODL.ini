### Frontend
[oodl_logging]
# log typed version
typed = false
# steps to log
module = false
ssa = false
# print all relations
verbose_output = false


### IR
[ir_logging]
# log typed version
typed = false
# lowerings
module = false
lowerings = false
# Optimizations
# Optimizations
analysis = true
control_graph = false
optimizations = true
optimization_stats = true
# Stats
stats_before_lowering = false
